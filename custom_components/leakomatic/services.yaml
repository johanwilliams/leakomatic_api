# Service definitions for leakomatic.change_mode (registered in __init__.py).
change_mode:
  name: Change mode
  description: Change the operating mode of a Leakomatic device.
  target:
    entity:
      domain: select
      integration: leakomatic
  fields:
    mode:
      name: Mode
      description: The new mode to set for the device.
      required: true
      selector:
        select:
          options:
            - label: Home
              value: home
            - label: Away
              value: away
            - label: Pause
              value: pause
